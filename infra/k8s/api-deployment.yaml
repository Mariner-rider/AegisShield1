apiVersion: apps/v1
kind: Deployment
metadata: { name: aegis-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: aegis-api } }
  template:
    metadata:
      labels: { app: aegis-api }
      annotations:
        sidecar.opentelemetry.io/inject: "true"
    spec:
      containers:
        - name: api
          image: aegis/api:latest
          ports: [{ containerPort: 4000 }]
          env:
            - name: NODE_ENV
              value: "production"
          livenessProbe:
            httpGet: { path: /health/live, port: 4000 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health/ready, port: 4000 }
            initialDelaySeconds: 5

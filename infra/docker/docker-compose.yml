services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  example-app:
    image: node:22
    working_dir: /app
    volumes: ["../../:/app"]
    command: sh -c "npm install && npx ts-node apps/example-express/src/server.ts"
    environment:
      - AEGIS_MODE=guard
      - DATABASE_URL=postgresql://aegis:aegis@postgres:5432/aegis
      - REDIS_URL=redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
